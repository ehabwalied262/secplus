<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC+ SY0-701 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: #1e2330;
    --accent: #00e5ff;
    --accent2: #ff3d6b;
    --text: #dce8f0;
    --muted: #566070;
    --green: #00ff9d;
    --yellow: #ffd166;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    width: 100%;
    padding: 28px 40px 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-badge {
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: bold;
    padding: 4px 10px;
    letter-spacing: 2px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent); }

  .main {
    width: 100%;
    max-width: 860px;
    padding: 36px 24px 60px;
  }

  /* CHAPTER SELECT */
  #chapter-screen h2 {
    font-size: 13px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .chapters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 12px;
  }

  .chapter-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s;
    position: relative;
    overflow: hidden;
  }

  .chapter-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 0;
    background: var(--accent);
    transition: width 0.2s;
  }

  .chapter-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .chapter-card:hover::after { width: 100%; }

  .chapter-card .num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .chapter-card .title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
  }

  .chapter-card .domain {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* QUIZ SCREEN */
  #quiz-screen { display: none; }

  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .back-btn {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--muted); }

  .chapter-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    margin-bottom: 36px;
  }

  .progress-bar {
    height: 3px;
    background: var(--accent);
    transition: width 0.4s;
  }

  /* QUESTION */
  .question-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
  }

  .question-box .q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  .question-box .q-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.55;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 15px;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,229,255,0.04); }

  .option-btn .letter {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    min-width: 18px;
    padding-top: 2px;
  }

  .option-btn.correct { border-color: var(--green); background: rgba(0,255,157,0.07); }
  .option-btn.correct .letter { color: var(--green); }
  .option-btn.wrong { border-color: var(--accent2); background: rgba(255,61,107,0.07); }
  .option-btn.wrong .letter { color: var(--accent2); }
  .option-btn:disabled { cursor: default; }

  /* EXPLANATION */
  .explanation {
    display: none;
    background: rgba(0,229,255,0.04);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 20px 24px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.7;
    color: #a8c0cc;
  }

  .explanation .exp-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .explanation.visible { display: block; }

  /* NEXT BTN */
  .next-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 32px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    transition: opacity 0.15s;
  }
  .next-btn:hover { opacity: 0.85; }
  .next-btn.visible { display: inline-block; }

  /* SCORE SCREEN */
  #score-screen {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .score-big {
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
  }

  .score-label {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-top: 10px;
    margin-bottom: 40px;
  }

  .score-msg {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 40px;
  }

  .action-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

  .btn-outline {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 28px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* LOADING */
  .loading-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 80px 0;
  }

  .loading-wrap.visible { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* ERROR */
  .error-box {
    background: rgba(255,61,107,0.08);
    border: 1px solid rgba(255,61,107,0.3);
    padding: 20px 24px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
    display: none;
    margin-bottom: 24px;
  }
  .error-box.visible { display: block; }

  @media (max-width: 520px) {
    .chapters-grid { grid-template-columns: 1fr 1fr; }
    .question-box .q-text { font-size: 16px; }
    .score-big { font-size: 72px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-badge">SEC+</div>
  <h1>SY0-701 <span>Quiz</span></h1>
</header>

<div class="main">

  <!-- CHAPTER SELECT -->
  <div id="chapter-screen">
    <h2>// Select a domain</h2>
    <div class="chapters-grid" id="chapters-grid"></div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">← Domains</button>
      <span class="chapter-label" id="quiz-chapter-label"></span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="loading-wrap" id="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text">GENERATING QUESTIONS...</div>
    </div>

    <div class="error-box" id="error-box"></div>

    <div id="quiz-content" style="display:none">
      <div class="question-box">
        <div class="q-num" id="q-num"></div>
        <div class="q-text" id="q-text"></div>
      </div>

      <div class="options" id="options"></div>

      <div class="explanation" id="explanation">
        <div class="exp-label">// EXPLANATION</div>
        <div id="exp-text"></div>
      </div>

      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>

  <!-- SCORE -->
  <div id="score-screen">
    <div class="score-big" id="score-pct"></div>
    <div class="score-label">QUIZ COMPLETE</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="action-row">
      <button class="next-btn" style="display:inline-block" onclick="retryQuiz()">Retry This Domain</button>
      <button class="btn-outline" onclick="goHome()">All Domains</button>
    </div>
  </div>

</div>

<script>
const CHAPTERS = [
  { num: "1.0", title: "General Security Concepts", domain: "Domain 1 — 12%", topics: "security controls, cryptography basics, authentication types, PKI, hashing, obfuscation, steganography" },
  { num: "2.0", title: "Threats, Vulnerabilities & Mitigations", domain: "Domain 2 — 22%", topics: "malware types, social engineering, application attacks, network attacks, vulnerability scanning, threat intelligence, OSINT" },
  { num: "3.0", title: "Security Architecture", domain: "Domain 3 — 18%", topics: "cloud security, network segmentation, zero trust, secure infrastructure, virtualization, ICS/SCADA, SD-WAN" },
  { num: "4.0", title: "Security Operations", domain: "Domain 4 — 28%", topics: "identity management, IAM, MFA, endpoint security, firewalls, IDS/IPS, SIEM, log monitoring, incident response" },
  { num: "5.0", title: "Security Program Management", domain: "Domain 5 — 20%", topics: "risk management, compliance, data privacy, auditing, policies, business continuity, vendor management, frameworks" },
];

const TOTAL_Q = 10;
let currentChapter = null;
let questions = [];
let currentQ = 0;
let score = 0;
let answered = false;

// Render chapter cards
const grid = document.getElementById('chapters-grid');
CHAPTERS.forEach((ch, i) => {
  const card = document.createElement('div');
  card.className = 'chapter-card';
  card.innerHTML = `
    <div class="num">DOMAIN ${ch.num}</div>
    <div class="title">${ch.title}</div>
    <div class="domain">${ch.domain}</div>
  `;
  card.onclick = () => startQuiz(i);
  grid.appendChild(card);
});

function goHome() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('chapter-screen').style.display = 'block';
}

async function startQuiz(idx) {
  currentChapter = CHAPTERS[idx];
  currentQ = 0;
  score = 0;
  questions = [];

  document.getElementById('chapter-screen').style.display = 'none';
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('quiz-chapter-label').textContent = `DOMAIN ${currentChapter.num} — ${currentChapter.title.toUpperCase()}`;
  document.getElementById('loading-wrap').classList.add('visible');
  document.getElementById('quiz-content').style.display = 'none';
  document.getElementById('error-box').classList.remove('visible');
  setProgress(0);

  try {
    questions = await fetchQuestions(currentChapter);
    document.getElementById('loading-wrap').classList.remove('visible');
    document.getElementById('quiz-content').style.display = 'block';
    renderQuestion();
  } catch (e) {
    document.getElementById('loading-wrap').classList.remove('visible');
    const eb = document.getElementById('error-box');
    eb.textContent = `ERROR: ${e.message || 'Failed to generate questions. Please try again.'}`;
    eb.classList.add('visible');
  }
}

async function fetchQuestions(chapter) {
  const prompt = `You are a CompTIA Security+ SY0-701 exam question writer.
Generate exactly ${TOTAL_Q} multiple-choice practice questions for the following domain:

Domain: ${chapter.num} — ${chapter.title}
Key topics: ${chapter.topics}

Requirements:
- Each question must be exam-realistic and test deep understanding, not just definitions.
- Mix question styles: scenario-based, "which of the following BEST", "which is MOST likely", etc.
- 4 answer options per question (A, B, C, D).
- Exactly one correct answer.
- Include a short explanation (2-3 sentences) for why the correct answer is right.

Respond ONLY with a valid JSON array. No preamble, no markdown, no backticks. Format:
[
  {
    "question": "...",
    "options": ["A. ...", "B. ...", "C. ...", "D. ..."],
    "answer": 0,
    "explanation": "..."
  }
]
The "answer" field is the 0-based index of the correct option.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  const raw = data.content.map(b => b.text || '').join('');
  const clean = raw.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  if (!Array.isArray(parsed) || parsed.length === 0) throw new Error("Invalid response format");
  return parsed;
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  setProgress(currentQ / TOTAL_Q * 100);

  document.getElementById('q-num').textContent = `// QUESTION ${currentQ + 1} OF ${TOTAL_Q}`;
  document.getElementById('q-text').textContent = q.question;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    // strip leading "A. " etc if model included it
    const text = opt.replace(/^[A-D]\.\s*/i, '');
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${text}</span>`;
    btn.onclick = () => selectAnswer(i, q.answer);
    opts.appendChild(btn);
  });

  document.getElementById('explanation').classList.remove('visible');
  document.getElementById('exp-text').textContent = '';
  document.getElementById('next-btn').classList.remove('visible');
}

function selectAnswer(chosen, correct) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    if (i === chosen && chosen !== correct) b.classList.add('wrong');
  });

  if (chosen === correct) score++;

  const expEl = document.getElementById('explanation');
  document.getElementById('exp-text').textContent = questions[currentQ].explanation;
  expEl.classList.add('visible');

  document.getElementById('next-btn').classList.add('visible');
  document.getElementById('next-btn').textContent = currentQ + 1 < TOTAL_Q ? 'Next Question →' : 'See Results';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL_Q) {
    showScore();
  } else {
    renderQuestion();
  }
}

function showScore() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('score-screen').style.display = 'block';

  const pct = Math.round(score / TOTAL_Q * 100);
  document.getElementById('score-pct').textContent = `${pct}%`;

  let msg = '';
  if (pct >= 90) msg = "Outstanding — you're exam-ready on this domain.";
  else if (pct >= 75) msg = "Solid performance. Review the ones you missed.";
  else if (pct >= 60) msg = "Getting there. More practice on this domain recommended.";
  else msg = "Keep grinding — this domain needs more attention.";

  document.getElementById('score-msg').textContent = `${score}/${TOTAL_Q} correct — ${msg}`;
}

function retryQuiz() {
  const idx = CHAPTERS.indexOf(currentChapter);
  startQuiz(idx);
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = pct + '%';
}
</script>
</body>
</html>
